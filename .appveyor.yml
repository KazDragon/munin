image:
  - Visual Studio 2022

# Build only on the master branch, and for PRs.
branches:
  only:
    - master

build:
  parallel: true
  verbosity: detailed

configuration:
  - Debug
  - Release

platform:
  - x64

environment:
  APPVEYOR_SAVE_CACHE_ON_ERROR: true
  VCPKG_ROOT: C:\Tools\vcpkg
  VCPKG_DEFAULT_BINARY_CACHE: C:\Tools\vcpkg\archives
  CMAKE_BUILD_PARALLEL_LEVEL: 4

  matrix:
    # currently disabled due to a problem linking: see issue #262
    #    - shared: True
    - shared: False

cache:
  - C:\Tools\vcpkg\installed
  - C:\Tools\vcpkg\downloads
  - C:\Tools\vcpkg\archives

init:
  - echo Appveyor Image = %APPVEYOR_BUILD_WORKER_IMAGE%
  - if "%APPVEYOR_BUILD_WORKER_IMAGE%"=="Visual Studio 2022" ( set "generator=Visual Studio 17 2022" && set "toolset=v143" )
  - echo Generator = %generator%

install:
  - cd %VCPKG_ROOT%
  - git fetch --tags --prune
  - git checkout 58950f88544e4637524dbd6a01d0317cf4cb77fc
  - .\bootstrap-vcpkg.bat
  - cd %appveyor_build_folder%
  - %VCPKG_ROOT%\vcpkg install boost-asio:%platform%-windows
  - %VCPKG_ROOT%\vcpkg install boost-container-hash:%platform%-windows
  - %VCPKG_ROOT%\vcpkg install boost-core:%platform%-windows
  - %VCPKG_ROOT%\vcpkg install boost-range:%platform%-windows
  - %VCPKG_ROOT%\vcpkg install boost-scope-exit:%platform%-windows
  - %VCPKG_ROOT%\vcpkg install boost-signals2:%platform%-windows
  - %VCPKG_ROOT%\vcpkg install boost-smart-ptr:%platform%-windows
  - %VCPKG_ROOT%\vcpkg install boost-spirit:%platform%-windows
  - %VCPKG_ROOT%\vcpkg install nlohmann-json:%platform%-windows
  - %VCPKG_ROOT%\vcpkg install gtest:%platform%-windows

  - mkdir c:\Source
  - cd C:\Source
  - git clone --depth 1 https://github.com/KazDragon/terminalpp
  - cd terminalpp
  - cmake -G "%generator%" -DCMAKE_TOOLCHAIN_FILE=%VCPKG_ROOT%/scripts/buildsystems/vcpkg.cmake -DTERMINALPP_WITH_TESTS=False -DCMAKE_INSTALL_PREFIX=C:/Libraries -DBUILD_SHARED_LIBS=%shared%  .
  - cmake --build . --config %configuration% -- /m
  - cmake --install . --config %configuration%

build_script:
  - cd %appveyor_build_folder%
  - mkdir build
  - cd build
  - cmake -G "%generator%" -DCMAKE_TOOLCHAIN_FILE=%VCPKG_ROOT%/scripts/buildsystems/vcpkg.cmake -DCMAKE_PREFIX_PATH=C:/Libraries -DBUILD_SHARED_LIBS=%shared% ..
  - cmake --build . --config %configuration% -- /m

test_script:
  - ctest . --output-on-failure -C %configuration%
